<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Convocation Program Entry Management</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-wrapper">

    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">C</div>
            <h1>Portal Sign In</h1>
            <p>Enter your credentials to access the scanner or dashboard</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. security1" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">
                <span id="btn-text">Sign In</span>
                <span id="btn-spinner" class="spinner" style="display: none; width: 18px; height: 18px;"></span>
            </button>
        </form>
    </div>

    <!-- Common script and login page specific script -->
    <script src="/static/js/common.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
