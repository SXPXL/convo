<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Convocation Program Entry Management</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">C</div>
            <span class="logo-text">Convocation 2026</span>
            <span class="logo-badge">Dashboard</span>
        </div>
        <div id="nav-right" style="display: flex; align-items: center; gap: 1.5rem;">
            <!-- Rendered dynamically by common.js -->
        </div>
    </header>

    <main>
        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-item">
                <label for="dept-select">Filter by Department</label>
                <select id="dept-select" style="width: 100%;">
                    <option value="">All Departments</option>
                    <!-- Populated dynamically -->
                </select>
            </div>

            <div class="filter-item">
                <label for="attendee-type-select">Attendee Type</label>
                <select id="attendee-type-select" style="width: 100%;">
                    <option value="">All Types (Students & Guardians)</option>
                    <option value="student">Students Only</option>
                    <option value="guardian">Guardians Only</option>
                </select>
            </div>

            <div class="filter-item" style="flex: 1.5;">
                <label for="search-input">Search Attendees</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="search-input" placeholder="Search by name, admission no, seat..."
                        style="flex: 1;">
                    <button id="clear-search-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Clear</button>
                </div>
            </div>
        </div>

        <!-- Statistics grid -->
        <div class="grid grid-cols-3" style="margin-bottom: 2rem;">
            <!-- Total Check-ins -->
            <div class="card stat-card">
                <div class="stat-info">
                    <span
                        style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; text-transform: uppercase;">Total
                        Attendance</span>
                    <span id="stat-total-entered" class="stat-value">0 / 0</span>
                    <span id="stat-total-percent"
                        style="font-size: 0.85rem; color: var(--success); font-weight: 600; margin-top: 0.25rem;">0%
                        Checked-in</span>
                    <div class="progress-bar-container">
                        <div id="total-progress-bar" class="progress-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="stat-icon-wrapper" style="background-color: var(--accent-light); color: var(--accent);">📊
                </div>
            </div>

            <!-- Student Check-ins -->
            <div class="card stat-card">
                <div class="stat-info">
                    <span
                        style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; text-transform: uppercase;">Student
                        Check-ins</span>
                    <span id="stat-students-entered" class="stat-value">0 / 0</span>
                    <span id="stat-students-percent"
                        style="font-size: 0.85rem; color: #a78bfa; font-weight: 600; margin-top: 0.25rem;">0%
                        checked-in</span>
                    <div class="progress-bar-container">
                        <div id="students-progress-bar" class="progress-bar" style="width: 0%; background: #a78bfa;">
                        </div>
                    </div>
                </div>
                <div class="stat-icon-wrapper" style="background-color: rgba(139, 92, 246, 0.15); color: #a78bfa;">🎓
                </div>
            </div>

            <!-- Guardian Check-ins -->
            <div class="card stat-card">
                <div class="stat-info">
                    <span
                        style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; text-transform: uppercase;">Guardian
                        Check-ins</span>
                    <span id="stat-guardians-entered" class="stat-value">0 / 0</span>
                    <span id="stat-guardians-percent"
                        style="font-size: 0.85rem; color: #60a5fa; font-weight: 600; margin-top: 0.25rem;">0%
                        checked-in</span>
                    <div class="progress-bar-container">
                        <div id="guardians-progress-bar" class="progress-bar" style="width: 0%; background: #60a5fa;">
                        </div>
                    </div>
                </div>
                <div class="stat-icon-wrapper" style="background-color: rgba(59, 130, 246, 0.15); color: #60a5fa;">👥
                </div>
            </div>
        </div>

        <!-- Dashboard Content Area -->
        <div class="card" style="padding: 0;">
            <!-- Tabs for filtering entered status -->
            <div class="tabs" style="padding: 1rem 1.5rem 0; margin-bottom: 0;">
                <button class="tab active" data-entered="all">All Registered (<span id="count-all">0</span>)</button>
                <button class="tab" data-entered="true">Checked In (<span id="count-entered">0</span>)</button>
                <button class="tab" data-entered="false">Not Checked In (<span id="count-not-entered">0</span>)</button>
            </div>

            <!-- Table Wrapper -->
            <div style="padding: 1.5rem;">
                <div class="table-container">
                    <table id="attendees-table">
                        <thead>
                            <tr>
                                <th style="width: 70px;">Photo</th>
                                <th>Admission No</th>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Seat No</th>
                                <th>Department</th>
                                <th>Status</th>
                                <th>Checked-in At</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Populated dynamically -->
                            <tr>
                                <td colspan="8" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                                    <div class="spinner" style="margin-bottom: 1rem;"></div>
                                    <div>Loading attendee database...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination info -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem;">
                    <div id="pagination-info" style="font-size: 0.9rem; color: var(--text-secondary);">
                        Showing 0 of 0 attendees
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="prev-page-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem;"
                            disabled>Previous</button>
                        <button id="next-page-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem;"
                            disabled>Next</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Script imports -->
    <script src="/static/js/common.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>

</html>
