        @keyframes border-rotate {

            50% { background-position: 100% 50%; }

        .expansion-wave {

            }

        .column-glow-interaction {

            top: 50%;
            left: 50%;

            width: 200%;
            height: 500px;
            background: transparent;

            transition: opacity 0.8s ease;
            pointer-events: none;

        @keyframes bloom-in {
            0% {
                transform: translateY(20px) scale(0.9);
                opacity: 0;
                filter: blur(10px);
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                filter: blur(0px);
            }
        }

        @keyframes bloom-out {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0px);
            }

            100% {
                transform: scale(1.05);
                opacity: 0;
                filter: blur(20px);
            }
        }

        .animate-bloom-in {
            animation: bloom-in 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .animate-bloom-out {
            animation: bloom-out 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;

            left: 0;

            height: 100%;
            background: transparent;
            pointer-events: none;

            0% {

                background-position: -200% center;

    </style>
</head>

<body class="text-on-surface select-none">

    <script>
        const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%239ca3af'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        const TOTAL_GATES = 5;
        const DISPLAY_DURATION = 5000; // Hold full screen for 5 seconds
        const STAGGER_DELAY = 250;     // Delay between rendering each profile

        // Global state trackers
        let globalQueue = [];
        let activeBatchCount = 0;      // How many profiles are currently on screen (0 to 5)
        let isHolding = false;         // True if screen is full and counting down the 5s
        let isFadingOut = false;       // True if current batch is animating out
        let isProcessing = false;      // True if we are in the 250ms stagger gap

        // Initialize WebSocket connection
        let socket = null;
        const reconnectInterval = 3000;

        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/checkins`;

            console.log(`[*] Connecting to WebSocket: ${wsUrl}`);
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                console.log('[+] WebSocket connected.');
            };

            socket.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.type === 'checkin') {
                        handleCheckInEvent(payload.data);
                    }
                } catch (err) {
                    console.error('[!] Error parsing WebSocket message:', err);
                }
            };

            socket.onclose = async (event) => {
                console.log(`[!] WebSocket closed. Code: ${event.code}. Attempting reconnect...`);
                
                // If rejected due to policy violation (token expired), attempt to refresh token first
                if (event.code === 1008) {
                    try {
                        const refreshRes = await fetch('/api/auth/refresh', {
                            method: 'POST',
                            credentials: 'include'
                        });
                        if (refreshRes.ok) {
                            console.log('[+] Token refreshed successfully. Reconnecting...');
                            setTimeout(connectWebSocket, 1000);
                            return;
                        }
                    } catch (e) {
                        console.error('[!] Failed to refresh session:', e);
                    }
                }
                
                setTimeout(connectWebSocket, reconnectInterval);
            };

            socket.onerror = (error) => {
                console.error('[!] WebSocket error:', error);
                socket.close();
            };
        }

        // Handle incoming check-in event
        function handleCheckInEvent(studentData) {
            // Only process students, ignore guests/guardians
            if (studentData.type !== 'student') {
                return;
            }

            // Map incoming data to match the UI fields
            const student = {
                name: studentData.name,
                dept: studentData.department || 'General',
                image: studentData.photo_url || DEFAULT_AVATAR
            };

            // Push to the queue and try to process
            globalQueue.push(student);
            updateGlobalQueueBadge();
            processQueue();
        }

        // Update the visual global queue badge count
        function updateGlobalQueueBadge() {
            let badge = document.getElementById('global-queue-badge');

            if (globalQueue.length > 0) {
                if (!badge) {
                    badge = document.createElement('div');
                    badge.id = 'global-queue-badge';
                    badge.className = "fixed bottom-8 right-8 text-sm font-normal text-on-surface opacity-30 z-50 pointer-events-none";
                    document.body.appendChild(badge);
                }
                badge.textContent = globalQueue.length;
                badge.style.display = 'block';
            } else {
                if (badge) {
                    badge.style.display = 'none';
                }
            }
        }

        // Toggle the cinematic welcome banner visibility
        function showWelcomePlaceholder(show) {
            const placeholder = document.getElementById('welcome-placeholder');
            const header = document.getElementById('top-header');
            const tagline = document.getElementById('footer-tagline');
            if (!placeholder) return;

            if (show) {
                placeholder.style.display = 'flex';
                void placeholder.offsetWidth; // force reflow
                placeholder.classList.remove('opacity-0');
                placeholder.classList.add('opacity-100');
                if (header) {
                    header.classList.remove('opacity-100');
                    header.classList.add('opacity-0');
                }
                if (tagline) {
                    tagline.classList.remove('opacity-100');
                    tagline.classList.add('opacity-0');
                }
            } else {
                placeholder.classList.remove('opacity-100');
                placeholder.classList.add('opacity-0');
                if (header) {
                    header.classList.remove('opacity-0');
                    header.classList.add('opacity-100');
                }
                if (tagline) {
                    tagline.classList.remove('opacity-0');
                    tagline.classList.add('opacity-100');
                }
                setTimeout(() => {
                    placeholder.style.display = 'none';
                }, 1000);
            }
        }

        // Particle generator for starry sparkles
        function createSparkles() {
            const container = document.getElementById('sparkles-container');
            if (!container) return;
            container.innerHTML = '';
            const count = 75; // Increased particle density
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'sparkle-particle';
                const size = Math.random() * 10 + 4; // Larger particle size range (4 to 14px)
                const left = Math.random() * 100;
                const duration = Math.random() * 8 + 8; // 8s to 16s
                const delay = Math.random() * -15; // start immediately in different animation points
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${left}%`;
                p.style.animationDuration = `${duration}s`;
                p.style.animationDelay = `${delay}s`;
                
                if (Math.random() > 0.5) {
                    p.style.background = 'radial-gradient(circle, rgba(251, 191, 36, 0.9) 0%, transparent 75%)';
                    p.style.boxShadow = '0 0 12px rgba(251, 191, 36, 0.6)';
                } else {
                    p.style.background = 'radial-gradient(circle, rgba(167, 139, 250, 0.9) 0%, transparent 75%)';
                    p.style.boxShadow = '0 0 12px rgba(167, 139, 250, 0.6)';
                }
                container.appendChild(p);
            }
        }

        // Process the queue and place students into available screen slots
        function processQueue() {
            // Block execution if we are animating, holding the full batch, or in stagger phase
            if (isHolding || isFadingOut || isProcessing) return;

            // If the screen is empty, we must wait until a full batch of 5 is ready
            if (activeBatchCount === 0 && globalQueue.length < TOTAL_GATES) {
                showWelcomePlaceholder(true);
                return;
            }

            // If we are starting to render a batch, hide placeholder
            if (activeBatchCount === 0 && globalQueue.length >= TOTAL_GATES) {
                showWelcomePlaceholder(false);
            }

            // Otherwise, we are rendering a batch of 5. Take the next student from the queue.
            isProcessing = true;
            const student = globalQueue.shift();
            activeBatchCount++;
            updateGlobalQueueBadge();

            // Render in the next available column (left to right)
            renderStudent(activeBatchCount, student);

            // Wait a brief moment to create the visual left-to-right cascade effect
            setTimeout(() => {
                isProcessing = false;

                // Did this student fill the final slot (column 5)?
                if (activeBatchCount >= TOTAL_GATES) {
                    // Lock the screen for 8 seconds (cinematic display duration)
                    isHolding = true;
                    setTimeout(() => {
                        isHolding = false;
                        // Time is up. If the next batch of 5 is ready, clear screen immediately
                        if (globalQueue.length >= TOTAL_GATES) {
                            flushAndNext();
                        } else {
                            // Fade out current batch and transition back to hearty welcome placeholder
                            flushAndShowWelcome();
                        }
                    }, 8000);
                } else {
                    // Continue rendering current batch
                    processQueue();
                }
            }, STAGGER_DELAY);
        }

        // Fade out current students and reset the board
        function flushAndNext() {
            if (isFadingOut) return;
            isFadingOut = true;

            // Trigger the bloom-out animation for all currently displayed students
            for (let i = 1; i <= activeBatchCount; i++) {
                const container = document.querySelector(`#gate-${i} .gate-content`);
                if (container) {
                    const activeCheckIn = container.querySelector('.active-check-in');
                    if (activeCheckIn) {
                        activeCheckIn.classList.remove('animate-bloom-in');
                        activeCheckIn.classList.add('animate-bloom-out');
                        clearColumnGlow(i);
                    }
                }
            }

            // Wait 1.2s for the CSS animation to finish
            setTimeout(() => {
                // Clear the DOM completely
                for (let i = 1; i <= TOTAL_GATES; i++) {
                    const container = document.querySelector(`#gate-${i} .gate-content`);
                    if (container) container.innerHTML = '';
                }

                // Reset state to empty screen
                activeBatchCount = 0;
                isFadingOut = false;

                // Immediately start loading the next batch from the queue if ready
                processQueue();
            }, 1200);
        }

        // Fade out current students and return to the cinematic welcome banner
        function flushAndShowWelcome() {
            if (isFadingOut) return;
            isFadingOut = true;

            // Trigger the bloom-out animation for all currently displayed students
            for (let i = 1; i <= activeBatchCount; i++) {
                const container = document.querySelector(`#gate-${i} .gate-content`);
                if (container) {
                    const activeCheckIn = container.querySelector('.active-check-in');
                    if (activeCheckIn) {
                        activeCheckIn.classList.remove('animate-bloom-in');
                        activeCheckIn.classList.add('animate-bloom-out');
                        clearColumnGlow(i);
                    }
                }
            }

            // Wait 1.2s for the CSS animation to finish
            setTimeout(() => {
                // Clear the DOM completely
                for (let i = 1; i <= TOTAL_GATES; i++) {
                    const container = document.querySelector(`#gate-${i} .gate-content`);
                    if (container) container.innerHTML = '';
                }

                // Reset state to empty screen
                activeBatchCount = 0;
                isFadingOut = false;

                // Fade back in the Hearty Welcome screen
                showWelcomePlaceholder(true);
            }, 1200);
        }

        // Create Profile card HTML matching the design tool styles
        function createProfileHTML(student) {
            return `
                <div class="active-check-in w-full flex flex-col items-center animate-bloom-in relative z-30 px-2">
                    <div class="photo-frame mb-4 lg:mb-8">
                        <div class="photo-frame-glow"></div>
                        <div class="rotating-border"></div>
                        <div class="gold-glow-pulse"></div>
                        <div class="expansion-wave"></div>
                        <div class="photo-border-shine"></div>
                        <div class="w-40 h-40 sm:w-40 sm:h-40 md:w-48 md:h-48 lg:w-56 lg:h-56 xl:w-64 xl:h-64 2xl:w-70 2xl:h-70 rounded-full p-2 bg-[#08070e] relative z-10 overflow-hidden shadow-2xl border border-white/10">
                            <img src="${student.image}" alt="Portrait" class="w-full h-full object-cover rounded-full">
                            <div class="absolute inset-0 shimmer-sweep"></div>
                        </div>
                    </div>
                    <div class="glass-card w-full max-w-[300px] py-4 lg:py-8 px-4 lg:px-6 rounded-2xl text-center border-white/10 shadow-2xl">
                        <h3 class="student-name text-base sm:text-lg md:text-xl lg:text-2xl xl:text-3xl text-on-surface mb-2 break-words leading-tight">${student.name}</h3>
                        <div class="inline-flex mt-1">
                            <span class="text-[11px] sm:text-xs md:text-sm font-semibold text-amber-300 tracking-[0.25em] uppercase">${student.dept}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Control column background glow interactions
        function triggerColumnGlow(gateNum) {
            const glow = document.querySelector(`#gate-${gateNum} .column-glow-interaction`);
            if (glow) {
                glow.style.opacity = '1';
                setTimeout(() => {
                    glow.style.opacity = '0.3';
                }, 1000);
            }
        }

        // Clear column glow
        function clearColumnGlow(gateNum) {
            const glow = document.querySelector(`#gate-${gateNum} .column-glow-interaction`);
            if (glow) {
                glow.style.opacity = '0';
            }
        }

        // Render student details
        function renderStudent(gateNum, student) {
            const container = document.querySelector(`#gate-${gateNum} .gate-content`);
            if (!container) return;

            container.innerHTML = createProfileHTML(student);
            triggerColumnGlow(gateNum);
        }

        // Start connection on load
        window.addEventListener('DOMContentLoaded', () => {
            createSparkles();
            showWelcomePlaceholder(true);
            connectWebSocket();

            // Run Demo Mode if '?demo=true' is in the URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('demo') === 'true') {
                console.log("[*] URL parameter 'demo=true' detected. Loading demo batch in 3 seconds...");
                setTimeout(() => {
                    const demoStudents = [
                        { name: "Aria Montgomery", dept: "Computer Science", image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=400&h=400" },
                        { name: "Ethan Hunt", dept: "Information Technology", image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=400&h=400" },
                        { name: "Sophia Loris", dept: "Electronics Engineering", image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=400&h=400" },
                        { name: "Marcus Aurelius", dept: "Mechanical Engineering", image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=400&h=400" },
                        { name: "Elena Gilbert", dept: "Biotechnology", image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400&h=400" }
                    ];
                    // Reset screen and queue
                    globalQueue = [];
                    activeBatchCount = 0;
                    isHolding = false;
                    isFadingOut = false;
                    isProcessing = false;
                    
                    // Clear the DOM content
                    for (let i = 1; i <= TOTAL_GATES; i++) {
                        const container = document.querySelector(`#gate-${i} .gate-content`);
                        if (container) container.innerHTML = '';
                    }

                    // Push students to queue
                    demoStudents.forEach(s => globalQueue.push(s));
                    updateGlobalQueueBadge();
                    processQueue();
                }, 3000); // 3-second delay to let the initial sparkles float
            }
        });
    </script>
</body>
