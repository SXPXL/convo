# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(year)d_%%(month)02d_%%(day)02d_%%(hour)02d%%(minute)02d-%%(rev)s_%%(slug)s

# prepend current directory to sys.path so that app modules can be imported
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to clone to the "slug" field in the migration file
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded
# from sys.path
# version_locations = %(here)s/bar:%(here)s/bat

# version path separator; defaults to ';'
# version_path_separator = ;

# logging configuration is loaded via logging.config.fileConfig()
# unless configuration_file is specified as 'none'
# (which means no logging config is loaded)
# logging_config_file = alembic.ini

[post_write_hooks]
# post_write_hooks defines scripts or methods that are run
# after generating a revision script.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
